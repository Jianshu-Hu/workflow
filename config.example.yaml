workflow:
  max_auto_replans_per_step: 3

planner:
  model: gemini-pro
  command_template: >-
    bash {repo_root}/workflow/run_gemini_noninteractive.sh {prompt_file}

discussion:
  command_template: >-
    bash workflow/run_gemini_discussion.sh {prompt_file}

executor:
  command_template: >-
    bash workflow/run_codex_executor.sh {prompt_file}
