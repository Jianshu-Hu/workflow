version: 1
confidence_scale:
  candidate_init: 0
  active_min: 1
  active_max: 10
  rejected_min: -5
  rejected_max: -1
review_policy:
  required_reviewers:
    - codex
    - claude
    - gemini
    - human
  activation_rule: Keep confidence at 0 until all required reviewers approve and a human explicitly promotes it.
  promotion_rule: Increase confidence only after future workflow usage shows the lesson prevented or detected a real issue, followed by codex, claude, gemini, and human review.
  rejection_rule: Use -1 to -5 when a candidate is unsupported, overgeneralized, harmful, or superseded.
lessons:
  - id: robot-dataset-action-state-ordering-gate
    title: Verify robot dataset action/state ordering before training
    confidence: 0
    mode: candidate
    claim: >
      Robot demonstration action and state ordering can differ between source
      storage formats, converted training tensors, and live environment controller
      inputs. Expensive policy training should not begin until action replay and
      state/action alignment are verified.
    applies_when:
      - converting robot demonstrations between formats such as parquet, HDF5, zarr, LeRobot, RoboCasa, or Robomimic
      - training or evaluating robot policies from offline demonstration actions
      - replaying stored robot action streams in a live simulator or environment
    does_not_apply_when:
      - actions are generated online directly from the same live environment controller
      - no dataset conversion, action replay, or offline policy training is involved
    required_checks:
      - Compare source action schema and order against the live env.step controller order.
      - Replay stored actions from stored initial states on sampled demonstrations before expensive training.
      - Restore stored terminal simulator states separately and evaluate the success predicate.
      - Verify state timing is aligned with the supervised observation/action pair, especially pre-action versus post-action state capture.
      - Treat action replay failure with successful terminal-state restoration as a dataset/controller compatibility blocker.
    anti_patterns:
      - Training on converted robot actions before expert action replay passes.
      - Treating terminal-state restoration success as proof that stored action streams are valid.
      - Assuming equal action dimensions imply equal action semantics.
      - Capturing current_env_states after env.step(action) and using them as if they were pre-action observation states.
    evidence:
      - workspace: workflow_runs/evaluate_mamba_dp3_on_robocasa_rerun
        path: discussion.md
        claim: LeRobot parquet action ordering differed from the env.step ordering expected by the live HybridMobileBase controller.
      - workspace: workflow_runs/evaluate_mamba_dp3_on_robocasa_rerun
        path: followup7_demo_replay_batch_audit.md
        claim: Stored action replay failed on 0/5 sampled demonstrations while stored terminal-state restoration succeeded on 5/5.
    falsification_conditions:
      - Expert action replay from stored initial states succeeds under the live evaluator.
      - Source action schema is mechanically derived from the same live controller order used by env.step.
      - Timestamped evidence proves state/action arrays use the correct pre-action alignment.
    review_required:
      - codex
      - claude
      - gemini
      - human
    reviews:
      codex: pending
      claude: pending
      gemini: pending
      human: pending
    usage_events: []
